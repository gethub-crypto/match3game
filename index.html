<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Match-3 Game</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/ui.css">
</head>
<body>

<!-- ================= TOP BAR (ЖИЗНИ) ================= -->
<div id="topBar">
  <div id="livesDisplay">❤️ 3</div>
</div>


<!-- ================= MENU ================= -->
<div id="menuScreen" class="screen active">
  <h1>Match-3</h1>

  <button onclick="goTo('map')">Играть</button>
</div>


<!-- ================= MAP ================= -->
<div id="mapScreen" class="screen">
  <h2>Карта уровней</h2>

  <button onclick="startLevel()">Level 1</button>

  <br><br>
  <button onclick="goTo('menu')">Назад</button>
</div>


<!-- ================= GAME ================= -->
<div id="gameScreen" class="screen">
  <h2>Игра</h2>

  <!-- ИГРОВОЕ ПОЛЕ -->
  <div id="board"></div>

  <br>
  <button onclick="restartLevel()">Заново</button>
  <button onclick="goTo('map')">Назад</button>
</div>


<!-- ================= POPUP ================= -->
<div id="popup" class="hidden">
  <div id="popupContent"></div>
</div>


<!-- ================= JS ================= -->

<!-- CORE -->
<script src="js/core/storage.js"></script>
<script src="js/core/stateManager.js"></script>

<!-- UI -->
<script src="js/ui/screens.js"></script>
<script src="js/ui/popup.js"></script>

<!-- SYSTEMS -->
<script src="js/systems/lives.js"></script>

 <!-- DATA -->
  <script src="js/data/levels.js"></script>

<!-- MAIN -->
<script src="js/main.js"></script>

</body>
  </html>
