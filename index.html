<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Match-3 Game</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/ui.css">
</head>
<body>

<!-- ================= TOP BAR (ЖИЗНИ) ================= -->
  <div id="topBar">
  <div id="livesDisplay">❤️ 3</div>
  <div id="coinsDisplay">💰 0</div>
  </div>


<!-- ================= MENU ================= -->
<div id="menuScreen" class="screen active">
  <h1>Match-3</h1>

  <button onclick="goTo('map')">🎮 Играть</button>
  
  <!-- 🎓 КНОПКА ТУТОРИАЛОВ -->
  <button onclick="showTutorialMenu()" style="background: linear-gradient(135deg, #667eea, #764ba2);">
    📚 Обучение
  </button>
</div>


<!-- ================= MAP ================= -->
<div id="mapScreen" class="screen">
  <h2>Карта уровней</h2>

  <div id="levelGrid"></div>

  <br>
  <button onclick="goTo('menu')">Назад</button>
</div>


<!-- ================= GAME ================= -->
<div id="gameScreen" class="screen">
  <h2>Игра</h2>

  <div id="hud">
  <div id="movesDisplay">Ходы: 0</div>
  <div id="targetDisplay"></div>
  </div>

  <!-- ТРЕКЕР КОЛЛЕКЦИОННЫХ ФИШЕК -->
  <div id="collectTracker"></div>

  <!-- ИГРОВОЕ ПОЛЕ -->
  <div id="board"></div>

  <br>
  <button onclick="restartLevel()">🔄 Заново</button>
  <button onclick="goTo('map')">🗺️ Назад</button>
  
  <!-- 🎓 КНОПКА ТУТОРИАЛОВ НА ИГРОВОМ ЭКРАНЕ -->
  <button onclick="showTutorialMenu()" style="background: linear-gradient(135deg, #667eea, #764ba2); font-size: 14px; padding: 8px 16px;">
    📚 Обучение
  </button>
</div>


<!-- ================= POPUP ================= -->
<div id="popup" class="hidden">
  <div id="popupContent"></div>
</div>


<!-- ================= JS ================= -->

<!-- CORE -->
<script src="js/core/storage.js"></script>
<script src="js/core/stateManager.js"></script>

<!-- UI -->
<script src="js/ui/screens.js"></script>
<script src="js/ui/popup.js"></script>

<!-- SYSTEMS -->
<script src="js/systems/lives.js"></script>

 <!-- DATA -->
  <script src="js/data/levels.js"></script>

  <!-- ENGINE -->
<!-- <script src="js/engine/match3.js"></script> 
  <script src="js/engine/gravity.js"></script> -->
<script src="js/matchDetection.js"></script>
  <script src="js/specials.js"></script>

  
<!-- Файлы туториала -->
<script src="tutorial/tutorialStorage.js"></script>
<script src="tutorial/tutorialBoards.js"></script>
<script src="tutorial/ghostHand.js"></script>
<script src="tutorial/tutorialOverlay.js"></script>
<script src="tutorial/tutorialAnalytics.js"></script>
<script src="tutorial/tutorialManager.js"></script>

<!-- MAIN -->
<script src="js/main.js"></script>

</body>
</html>
